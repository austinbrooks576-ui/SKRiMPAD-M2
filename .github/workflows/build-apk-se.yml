name: Build APK (Special Edition)

on:
  push:
    branches: [claude/special-edition-samurai]
    paths:
      - 'android/**'
      - '.github/workflows/build-apk-se.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk skrimpad-m2-special-edition.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: skrimpad-m2-special-edition
          path: skrimpad-m2-special-edition.apk

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: se-v1.0.${{ github.run_number }}
          name: SKRiMPAD M2 — Special Edition (Samurai Champloo) v1.0.${{ github.run_number }}
          body: |
            SKRiMPAD M2 — **Special Edition** (Samurai Champloo HUD)

            A red-and-gold Ukiyo-e themed edition with a circular orbital HUD centerpiece,
            arced level meters, parallax woodblock background, and frosted-glass module
            windows. The whole layout is driven by `layout.json` — swap that file to
            re-theme the whole console. Boots straight into the HUD; press ✕ (top-right)
            to flip to the classic studio anytime.

            Includes every main-edition feature: mode-button sound assignment, smart AI
            commands, snap mixer, ZIP pack import, MIDI + gamepad, floating windows.

            **Install:** Download `skrimpad-m2-special-edition.apk`, enable "Install unknown
            apps" in Android settings, then open to install.
          files: skrimpad-m2-special-edition.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
