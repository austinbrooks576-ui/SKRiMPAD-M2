name: Build APK

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'scripts/set-edition.js'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set consumer edition (hide Special Edition HUD)
        run: node scripts/set-edition.js android/app/src/main/assets/index.html consumer

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Name the download file
        run: cp android/app/build/outputs/apk/debug/app-debug.apk "SKRiMPAD Setup ${{ github.run_number }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: skrimpad-setup-${{ github.run_number }}
          path: SKRiMPAD Setup ${{ github.run_number }}.apk

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: SKRiMPAD M2 — Setup ${{ github.run_number }}
          body: |
            SKRiMPAD M2 — Consumer Edition (Android APK)

            Download **`SKRiMPAD Setup ${{ github.run_number }}.apk`**, enable "Install unknown apps" in Android settings, then open to install.
          files: SKRiMPAD Setup ${{ github.run_number }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
