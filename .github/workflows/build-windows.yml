name: Build Windows

on:
  push:
    branches: [main]
    paths:
      - 'electron/**'
      - 'android/app/src/main/assets/index.html'
      - 'scripts/set-edition.js'
      - '.github/workflows/build-windows.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Copy app to electron
        shell: bash
        run: |
          mkdir -p electron/app
          cp android/app/src/main/assets/index.html electron/app/index.html

      - name: Set consumer edition (hide Special Edition HUD)
        run: node scripts/set-edition.js electron/app/index.html consumer

      - name: Install dependencies
        run: |
          cd electron
          npm install

      - name: Build Windows installer
        run: |
          cd electron
          npm run build:win

      - name: Name the download files
        shell: bash
        run: |
          cd electron/dist
          n="${{ github.run_number }}"
          for f in *.exe; do
            case "$f" in
              *Setup*) mv "$f" "SKRiMPAD Setup ${n} (Installer).exe";;
              *)       mv "$f" "SKRiMPAD Setup ${n} (Portable).exe";;
            esac
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: skrimpad-setup-${{ github.run_number }}-windows
          path: electron/dist/*.exe

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: win-v1.0.${{ github.run_number }}
          name: SKRiMPAD M2 Windows — Setup ${{ github.run_number }}
          body: |
            SKRiMPAD M2 — Consumer Edition for Windows

            - **`SKRiMPAD Setup ${{ github.run_number }} (Installer).exe`** — installs to Program Files with shortcuts
            - **`SKRiMPAD Setup ${{ github.run_number }} (Portable).exe`** — runs from anywhere, no install needed

            **Requirements:** Windows 10+ (64-bit)
          files: |
            electron/dist/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
