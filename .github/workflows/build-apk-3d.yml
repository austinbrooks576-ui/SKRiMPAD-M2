name: Build APK (3D Sandbox)

on:
  push:
    branches: [claude/3d-sandbox]
    paths:
      - 'android/**'
      - '.github/workflows/build-apk-3d.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk skrimpad-3d-sandbox.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: skrimpad-3d-sandbox
          path: skrimpad-3d-sandbox.apk

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: 3d-v1.0.${{ github.run_number }}
          name: SKRiMPAD 3D Sandbox (experimental) v1.0.${{ github.run_number }}
          body: |
            **EXPERIMENTAL** — Skrimpad 3D Sandbox prototype.

            A Three.js radial dashboard: central glowing dial, four 3D panels
            (DRUMS+SEQ / KEYS / MIXER / SYNTH) orbiting it. Drag to rotate the
            dashboard, tap a panel for tactile feedback.

            ⚠ Needs an internet connection on launch (Three.js loads from CDN).
            This build replaces the whole app UI — it is a visual sandbox only,
            no audio engine. The real app lives in the main / Special Edition
            releases.

            **Install:** Download `skrimpad-3d-sandbox.apk`, enable "Install
            unknown apps" in Android settings, then open to install.
          files: skrimpad-3d-sandbox.apk
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
