name: Build Windows (Special Edition)

on:
  push:
    branches: [claude/special-edition-samurai]
    paths:
      - 'electron/**'
      - 'android/app/src/main/assets/index.html'
      - 'android/app/src/main/assets/layout.json'
      - '.github/workflows/build-windows-se.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Copy app to electron
        shell: bash
        run: |
          mkdir -p electron/app
          cp android/app/src/main/assets/index.html electron/app/index.html
          cp android/app/src/main/assets/layout.json electron/app/layout.json

      - name: Install dependencies
        run: |
          cd electron
          npm install

      - name: Build Windows installer
        run: |
          cd electron
          npm run build:win

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: skrimpad-m2-se-windows
          path: |
            electron/dist/*.exe
            electron/dist/*.zip

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: se-win-v1.0.${{ github.run_number }}
          name: SKRiMPAD M2 — Special Edition Windows v1.0.${{ github.run_number }}
          body: |
            SKRiMPAD M2 — **Special Edition** (Samurai Champloo HUD) for Windows

            - **Installer** (.exe) — installs to Program Files with shortcuts
            - **Portable** (.exe) — runs from anywhere, no install needed

            Red-and-gold Ukiyo-e theme, circular orbital HUD, arc meters, parallax
            background, frosted-glass modules driven by `layout.json`. Boots into the
            HUD; press ✕ to return to the classic studio.

            **Requirements:** Windows 10+ (64-bit)
          files: |
            electron/dist/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
