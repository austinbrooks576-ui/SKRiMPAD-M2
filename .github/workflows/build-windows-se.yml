name: Build Windows (Special Edition)

on:
  push:
    branches: [claude/special-edition-samurai]
    paths:
      - 'electron/**'
      - 'android/app/src/main/assets/index.html'
      - 'android/app/src/main/assets/layout.json'
      - '.github/workflows/build-windows-se.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Copy app to electron
        shell: bash
        run: |
          mkdir -p electron/app
          cp android/app/src/main/assets/index.html electron/app/index.html
          cp android/app/src/main/assets/layout.json electron/app/layout.json

      - name: Install dependencies
        run: |
          cd electron
          npm install

      - name: Build Windows installer
        run: |
          cd electron
          npm run build:win

      - name: Name the download files
        shell: bash
        run: |
          cd electron/dist
          n="${{ github.run_number }}"
          for f in *.exe; do
            case "$f" in
              *Setup*) mv "$f" "SKRiMPAD SE Setup ${n} (Installer).exe";;
              *)       mv "$f" "SKRiMPAD SE Setup ${n} (Portable).exe";;
            esac
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: skrimpad-se-setup-${{ github.run_number }}-windows
          path: electron/dist/*.exe

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: se-win-v1.0.${{ github.run_number }}
          name: SKRiMPAD M2 — Special Edition Windows — Setup ${{ github.run_number }}
          body: |
            SKRiMPAD M2 — **Special Edition** (Samurai Champloo HUD) for Windows

            - **`SKRiMPAD SE Setup ${{ github.run_number }} (Installer).exe`** — installs to Program Files with shortcuts
            - **`SKRiMPAD SE Setup ${{ github.run_number }} (Portable).exe`** — runs from anywhere, no install needed

            A standalone themed studio — boots straight into the HUD. SIX themes
            behind the 🎨 palette: Samurai Champloo, Space Dust, Cyberpunk,
            Adeptus Mechanicus, Mushroom RGB, 80s Wizard Arcade — HUD AI console,
            floating BPM/volume pills, REVOLVE orbit (glass windows sweep behind
            the AI node), themed library + sample editor, katanas + dragon.

            **Requirements:** Windows 10+ (64-bit)
          files: |
            electron/dist/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
