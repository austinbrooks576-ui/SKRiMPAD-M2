<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Skrimpad 3D Sandbox</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0d0202; font-family: sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; z-index: 1; }
        #gui-overlay { position: absolute; top: 10px; left: 10px; z-index: 10; color: #ff3333; pointer-events: none; }
        .hud-panel { background: rgba(255, 0, 0, 0.05); border: 1px solid #ff3333; padding: 10px; border-radius: 8px; pointer-events: auto; }
        #gemini-status { color: #33a6ff; font-weight: bold; margin-top: 5px; }
    </style>
    <!-- Three.js r128 — vendored locally so the sandbox works offline -->
    <script src="three.min.js"></script>
</head>
<body>

    <div id="gui-overlay">
        <div class="hud-panel">
            <h3>SKRIMPAD 3D SYSTEM</h3>
            <p>Drag to Rotate Dashboard Panels</p>
            <div id="gemini-status">Gemini Status: Standby</div>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script>
        // --- 3D Scene Initialization ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0d0202, 0.03);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        // --- Lighting & Atmosphere ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.15);
        scene.add(ambientLight);

        const centralGlow = new THREE.PointLight(0xff3300, 2, 20);
        centralGlow.position.set(0, 0, 0);
        scene.add(centralGlow);

        // --- Central Dial (The Axis of Rotation) ---
        const dialGeometry = new THREE.CylinderGeometry(2, 2, 0.5, 32);
        const dialMaterial = new THREE.MeshStandardMaterial({
            color: 0x221111,
            roughness: 0.2,
            metalness: 0.8,
            emissive: 0xff1100,
            emissiveIntensity: 0.2
        });
        const centralDial = new THREE.Mesh(dialGeometry, dialMaterial);
        centralDial.rotation.x = Math.PI / 2; // Face the camera flatly
        scene.add(centralDial);

        // Decorative BPM Text Ring
        const ringGeo = new THREE.RingGeometry(2.1, 2.3, 32);
        const ringMat = new THREE.MeshBasicMaterial({ color: 0xffaa00, side: THREE.DoubleSide });
        const textRing = new THREE.Mesh(ringGeo, ringMat);
        textRing.position.z = 0.26;
        centralDial.add(textRing);

        // --- Radial Dashboard Setup ---
        const dashboardGroup = new THREE.Group();
        scene.add(dashboardGroup);

        const panelNames = ["DRUMS + SEQ", "KEYS", "MIXER", "SYNTH"];
        const panelColors = [0xff3333, 0x33a6ff, 0x00ff66, 0xffaa00];
        const panelCount = panelNames.length;
        const radius = 6; // Radius away from center circle
        const panels = [];

        for (let i = 0; i < panelCount; i++) {
            const angle = (i / panelCount) * Math.PI * 2;

            // Build extruded 3D panel shape
            const panelGeo = new THREE.BoxGeometry(3.5, 2.5, 0.3);
            const panelMat = new THREE.MeshStandardMaterial({
                color: 0x1a1a1a,
                roughness: 0.4,
                metalness: 0.5
            });

            const panelMesh = new THREE.Mesh(panelGeo, panelMat);

            // Position panel around the central ring
            panelMesh.position.set(Math.cos(angle) * radius, Math.sin(angle) * radius, 0);
            // Orient panel facing slightly toward the camera structure
            panelMesh.lookAt(0, 0, camera.position.z * 0.5);

            // Coloured edge glow so each panel reads as its own instrument
            const edge = new THREE.Mesh(
                new THREE.BoxGeometry(3.7, 2.7, 0.1),
                new THREE.MeshBasicMaterial({ color: panelColors[i] })
            );
            edge.position.z = -0.12;
            panelMesh.add(edge);

            // Store unique UI metadata
            panelMesh.userData = { id: panelNames[i], color: panelColors[i] };

            dashboardGroup.add(panelMesh);
            panels.push(panelMesh);
        }

        // --- Touch/Mouse Interaction for Panel Rotation ---
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('mousedown', (e) => { isDragging = true; });
        window.addEventListener('touchstart', (e) => {
            isDragging = true;
            previousMousePosition.x = e.touches[0].clientX;
            previousMousePosition.y = e.touches[0].clientY;
        });

        window.addEventListener('mousemove', handlePointerMove);
        window.addEventListener('touchmove', (e) => {
            handlePointerMove(e.touches[0]);
        });

        window.addEventListener('mouseup', () => { isDragging = false; });
        window.addEventListener('touchend', () => { isDragging = false; });

        function handlePointerMove(e) {
            const currentX = e.clientX;
            const currentY = e.clientY;

            if (isDragging) {
                const deltaX = currentX - previousMousePosition.x;
                // Rotate the entire dashboard around the Z axis
                dashboardGroup.rotation.z += deltaX * 0.007;
            }

            previousMousePosition.x = currentX;
            previousMousePosition.y = currentY;
        }

        // Tap Detection (Raycasting Sandbox)
        window.addEventListener('click', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            const intersects = raycaster.intersectObjects(dashboardGroup.children);
            if (intersects.length > 0) {
                const hitPanel = intersects[0].object;
                triggerPanelFeedback(hitPanel);
            }
        });

        function triggerPanelFeedback(panel) {
            // Visual tactile punch reaction on click/tap
            panel.position.z += 0.4;
            setTimeout(() => { panel.position.z -= 0.4; }, 100);

            // Send trigger metadata to the Android Java bridge
            if (window.AndroidBridge) {
                window.AndroidBridge.onUiInteraction(panel.userData.id);
            }
        }

        // --- Render Loop ---
        function animate() {
            requestAnimationFrame(animate);
            // Steady subtle idle breathing effect for center ring
            centralDial.rotation.y += 0.005;
            renderer.render(scene, camera);
        }

        // Handle window scaling seamlessly
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
