<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Skrimpad 3D Sandbox</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0d0202; font-family: sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; z-index: 1; }
        #gui-overlay { position: absolute; top: 10px; left: 10px; z-index: 10; color: #ff3333; pointer-events: none; }
        .hud-panel { background: rgba(255, 0, 0, 0.05); border: 1px solid #ff3333; padding: 10px; border-radius: 8px; pointer-events: auto; }
        #gemini-status { color: #33a6ff; font-weight: bold; margin-top: 5px; }
    </style>
    <!-- Three.js r128 — vendored locally so the sandbox works offline -->
    <script src="three.min.js"></script>
</head>
<body>

    <div id="gui-overlay">
        <div class="hud-panel">
            <h3>SKRIMPAD 3D SYSTEM</h3>
            <p>Drag to Rotate Dashboard Panels</p>
            <div id="gemini-status">Gemini Status: Standby</div>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script>
        // --- 3D Scene Initialization ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0d0202, 0.03);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        // --- Lighting & Atmosphere ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.15);
        scene.add(ambientLight);

        const centralGlow = new THREE.PointLight(0xff3300, 2, 20);
        centralGlow.position.set(0, 0, 0);
        scene.add(centralGlow);

        // --- Central Dial (The Axis of Rotation) ---
        const dialGeometry = new THREE.CylinderGeometry(2, 2, 0.5, 32);
        const dialMaterial = new THREE.MeshStandardMaterial({
            color: 0x221111,
            roughness: 0.2,
            metalness: 0.8,
            emissive: 0xff1100,
            emissiveIntensity: 0.2
        });
        const centralDial = new THREE.Mesh(dialGeometry, dialMaterial);
        centralDial.rotation.x = Math.PI / 2; // Face the camera flatly
        scene.add(centralDial);

        // Decorative BPM Text Ring
        const ringGeo = new THREE.RingGeometry(2.1, 2.3, 32);
        const ringMat = new THREE.MeshBasicMaterial({ color: 0xffaa00, side: THREE.DoubleSide });
        const textRing = new THREE.Mesh(ringGeo, ringMat);
        textRing.position.z = 0.26;
        centralDial.add(textRing);

        // --- Radial Dashboard Setup ---
        const dashboardGroup = new THREE.Group();
        scene.add(dashboardGroup);

        const panelNames = ["DRUMS + SEQ", "KEYS", "MIXER", "SYNTH"];
        const panelColors = [0xff3333, 0x33a6ff, 0x00ff66, 0xffaa00];
        const panelCount = panelNames.length;
        const radius = 6; // Radius away from center circle
        const panels = [];

        for (let i = 0; i < panelCount; i++) {
            const angle = (i / panelCount) * Math.PI * 2;

            // Build extruded 3D panel shape
            const panelGeo = new THREE.BoxGeometry(3.5, 2.5, 0.3);
            const panelMat = new THREE.MeshStandardMaterial({
                color: 0x1a1a1a,
                roughness: 0.4,
                metalness: 0.5
            });

            const panelMesh = new THREE.Mesh(panelGeo, panelMat);

            // Position panel around the central ring
            panelMesh.position.set(Math.cos(angle) * radius, Math.sin(angle) * radius, 0);
            // Orient panel facing slightly toward the camera structure
            panelMesh.lookAt(0, 0, camera.position.z * 0.5);

            // Coloured edge glow so each panel reads as its own instrument
            const edge = new THREE.Mesh(
                new THREE.BoxGeometry(3.7, 2.7, 0.1),
                new THREE.MeshBasicMaterial({ color: panelColors[i] })
            );
            edge.position.z = -0.12;
            panelMesh.add(edge);

            // Store unique UI metadata
            panelMesh.userData = { id: panelNames[i], color: panelColors[i] };

            dashboardGroup.add(panelMesh);
            panels.push(panelMesh);
        }

        // --- Touch/Mouse Interaction for Panel Rotation ---
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('mousedown', (e) => { isDragging = true; });
        window.addEventListener('touchstart', (e) => {
            isDragging = true;
            previousMousePosition.x = e.touches[0].clientX;
            previousMousePosition.y = e.touches[0].clientY;
        });

        window.addEventListener('mousemove', handlePointerMove);
        window.addEventListener('touchmove', (e) => {
            handlePointerMove(e.touches[0]);
        });

        window.addEventListener('mouseup', () => { isDragging = false; });
        window.addEventListener('touchend', () => { isDragging = false; });

        function handlePointerMove(e) {
            const currentX = e.clientX;
            const currentY = e.clientY;

            if (isDragging) {
                const deltaX = currentX - previousMousePosition.x;
                // Rotate the entire dashboard around the Z axis
                dashboardGroup.rotation.z += deltaX * 0.007;
            }

            previousMousePosition.x = currentX;
            previousMousePosition.y = currentY;
        }

// =====================================================================

// Module layout (grid positions) is shared across themes; titles come from the theme.
const SE_MODULES = [
  { id: 'pads', icon: 'drums', grid_position: { x: 1, y: 2, w: 4, h: 3 } },
  { id: 'seq', icon: 'seq', grid_position: { x: 1, y: 5, w: 4, h: 2 } },
  { id: 'synth', icon: 'synth', grid_position: { x: 1, y: 7, w: 4, h: 2 } },
  { id: 'keys', icon: 'keys', grid_position: { x: 9, y: 2, w: 4, h: 3 } },
  { id: 'mixer', icon: 'mixer', grid_position: { x: 9, y: 5, w: 4, h: 2 } },
  { id: 'lib', icon: 'lib', grid_position: { x: 9, y: 7, w: 4, h: 2 } },
  { id: 'fx', icon: 'fx', grid_position: { x: 5, y: 7, w: 4, h: 2 } }
];
let seThemeId = 'champloo';
let seLayout = { theme: SE_THEMES.champloo, modules: SE_MODULES };
let seOn = false, seHudRAF = null, seParked = [], seWasStudio = false, seParticleRAF = null;
// Which live DOM panel powers each module id (re-parented, then returned home on exit)
const SE_SOURCE = { pads: 'pads-panel', seq: 'seq-panel', keys: 'keys-panel', mixer: 'faders-panel', synth: 'synth-panel', fx: 'fx-panel', lib: 'lib-panel' };

function seToast(msg) {
  const t = document.getElementById('se-toast'); if (!t) return;
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._h); t._h = setTimeout(() => t.classList.remove('show'), 2200);
}
// hex → "r,g,b"
function hexRGB(h) {
  const m = h.replace('#', ''); const n = parseInt(m.length === 3 ? m.split('').map(c => c + c).join('') : m, 16);
  return ((n >> 16) & 255) + ',' + ((n >> 8) & 255) + ',' + (n & 255);
}
function seApplyTheme(th) {
  const r = document.getElementById('se-root').style;
  r.setProperty('--se-c1', th.c1); r.setProperty('--se-c2', th.c2); r.setProperty('--se-c3', th.c3);
  r.setProperty('--se-line', th.line); r.setProperty('--se-glow', th.glow); r.setProperty('--se-accent', th.accent);
  r.setProperty('--se-ink', th.ink); r.setProperty('--se-paper', th.paper); r.setProperty('--se-font', th.font);
  r.setProperty('--se-ink-rgb', hexRGB(th.ink)); r.setProperty('--se-line-rgb', hexRGB(th.line)); r.setProperty('--se-glow-rgb', hexRGB(th.glow));
  document.getElementById('se-root').setAttribute('data-theme', seThemeId);
  const ti = document.getElementById('se-subtitle'); if (ti) ti.textContent = th.sub;
  const gl = document.getElementById('se-hud-glyph'); if (gl) gl.textContent = th.glyph;
  // the classic synth (scope + wave shaper) recolors to match the theme
  document.body.style.setProperty('--wave-accent', th.glow);
}
function seColsRows() {
  // 12-col grid mapped onto the viewport, leaving the center clear for the HUD
  const W = innerWidth, H = innerHeight;
  return { cw: W / 12, ch: (H - 52) / 8, top: 48 };
}
function seBuildModules() {
  const host = document.getElementById('se-modules');
  host.innerHTML = ''; seParked = [];
  const { cw, ch, top } = seColsRows();
  seLayout.modules.forEach(m => {
    const src = document.getElementById(SE_SOURCE[m.id]);
    if (!src) return;
    const win = document.createElement('div');
    win.className = 'se-mod ' + (m.style_class || 'glass');
    win.dataset.mid = m.id;
    const gp = m.grid_position;
    // desktop: absolute glass window; mobile CSS overrides to a simple stack
    win.style.left = ((gp.x - 1) * cw) + 'px';
    win.style.top = (top + (gp.y - 1) * ch) + 'px';
    win.style.width = (gp.w * cw - 10) + 'px';
    win.style.height = (gp.h * ch - 10) + 'px';
    const head = document.createElement('div'); head.className = 'se-mod-head';
    const title = (seLayout.theme.titles && seLayout.theme.titles[m.id]) || m.id.toUpperCase();
    head.innerHTML = `<span class="mt">${svgIcon(m.icon || 'fx')}${title}</span>`;
    const min = document.createElement('button'); min.className = 'mmin'; min.textContent = '—';
    head.appendChild(min);
    const body = document.createElement('div'); body.className = 'se-mod-body';
    // park the real panel's home so we can restore it on exit
    seParked.push({ node: src, parent: src.parentNode, next: src.nextSibling, cssText: src.style.cssText });
    // panels are position:absolute;inset:0;display:none by default — force them
    // to flow visibly inside the glass module body
    src.style.position = 'static';
    src.style.inset = 'auto';
    src.style.display = 'block';
    src.classList.add('se-parked');
    body.appendChild(src);
    win.appendChild(head); win.appendChild(body);
    host.appendChild(win);
    // minimize → dock chip
    min.addEventListener('click', e => {
      e.stopPropagation();
      win.classList.add('min');
      const dock = document.getElementById('se-dock');
      const chip = document.createElement('button'); chip.className = 'se-chip'; chip.textContent = m.title;
      chip.addEventListener('click', () => { win.classList.remove('min'); chip.remove(); });
      dock.appendChild(chip);
    });
    // drag by header
    let drag = null;
    head.addEventListener('pointerdown', e => {
      if (e.target === min) return;
      drag = { dx: e.clientX - win.offsetLeft, dy: e.clientY - win.offsetTop };
      try { head.setPointerCapture(e.pointerId); } catch (err) {}
      win.style.zIndex = 200;
    });
    head.addEventListener('pointermove', e => { if (drag) { win.style.left = Math.max(0, e.clientX - drag.dx) + 'px'; win.style.top = Math.max(44, e.clientY - drag.dy) + 'px'; } });
    ['pointerup', 'pointercancel'].forEach(ev => head.addEventListener(ev, () => drag = null));
  });
}
function seRestoreModules() {
  // put every re-parented panel back exactly where it came from
  seParked.forEach(p => {
    p.node.classList.remove('se-parked');
    p.node.style.cssText = p.cssText; // restore original inline styles verbatim
    if (p.next && p.next.parentNode === p.parent) p.parent.insertBefore(p.node, p.next);
    else p.parent.appendChild(p.node);
  });
  seParked = [];
}
// ---- Circular orbital HUD bound to the AnalyserNode ----
function seDrawHUD() {
  const cv = document.getElementById('se-hud'); if (!cv) return;
  const g = cv.getContext('2d'), W = cv.width, H = cv.height, cx = W / 2, cy = H / 2;
  let sweep = 0, freq = null;
  if (audioReady && analyser) freq = new Uint8Array(analyser.frequencyBinCount);
  const loop = () => {
    if (!seOn) return;
    seHudRAF = requestAnimationFrame(loop);
    // live theme colours (change instantly when the theme is switched)
    const th = seLayout.theme, lineC = hexRGB(th.line), glowC = hexRGB(th.glow), accC = hexRGB(th.accent), inkC = hexRGB(th.ink);
    g.clearRect(0, 0, W, H);
    let level = 0;
    if (freq) { analyser.getByteFrequencyData(freq); for (let i = 0; i < freq.length; i++) level += freq[i]; level /= freq.length * 255; }
    // outer static rings
    for (let r = 0; r < 3; r++) {
      const rad = 150 + r * 26;
      g.beginPath(); g.arc(cx, cy, rad, 0, Math.PI * 2);
      g.strokeStyle = 'rgba(' + lineC + ',' + (0.5 - r * 0.12) + ')'; g.lineWidth = r === 0 ? 2 : 1; g.stroke();
    }
    // tick marks
    g.strokeStyle = 'rgba(' + glowC + ',.55)';
    for (let a = 0; a < 60; a++) {
      const ang = (a / 60) * Math.PI * 2, big = a % 5 === 0;
      const r1 = 150, r2 = 150 - (big ? 12 : 6);
      g.beginPath(); g.moveTo(cx + Math.cos(ang) * r1, cy + Math.sin(ang) * r1); g.lineTo(cx + Math.cos(ang) * r2, cy + Math.sin(ang) * r2); g.lineWidth = big ? 2 : 1; g.stroke();
    }
    // radial spectrum bars (react to audio) — colour lerps line→glow with level
    if (freq) {
      const n = 72, step = Math.floor(freq.length / n);
      for (let i = 0; i < n; i++) {
        const v = freq[i * step] / 255, ang = (i / n) * Math.PI * 2 - Math.PI / 2;
        const r1 = 60, r2 = 60 + v * 78;
        g.beginPath(); g.moveTo(cx + Math.cos(ang) * r1, cy + Math.sin(ang) * r1); g.lineTo(cx + Math.cos(ang) * r2, cy + Math.sin(ang) * r2);
        g.strokeStyle = 'rgba(' + (v > 0.5 ? glowC : accC) + ',' + (0.4 + v * 0.6) + ')'; g.lineWidth = 3; g.stroke();
      }
    }
    // rotating dial ring driven by transport / level
    const t = performance.now() / 1000;
    const spin = t * (0.4 + level * 3);
    g.save(); g.translate(cx, cy); g.rotate(spin);
    g.beginPath(); g.arc(0, 0, 118, 0, Math.PI * 1.5); g.strokeStyle = th.glow; g.lineWidth = 3; g.stroke();
    g.beginPath(); g.arc(0, 0, 100, Math.PI, Math.PI * 2.1); g.strokeStyle = th.accent; g.lineWidth = 2; g.stroke();
    g.restore();
    // sweep needle (radar) — speed follows BPM if playing
    {
      const bpm = parseInt((document.getElementById('bpm') || {}).value) || 90;
      sweep += (seqPlaying ? bpm / 900 : 0.012);
      const ang = sweep % (Math.PI * 2);
      const grd = g.createLinearGradient(cx, cy, cx + Math.cos(ang) * 150, cy + Math.sin(ang) * 150);
      grd.addColorStop(0, 'rgba(' + glowC + ',.9)'); grd.addColorStop(1, 'rgba(' + glowC + ',0)');
      g.beginPath(); g.moveTo(cx, cy); g.lineTo(cx + Math.cos(ang) * 150, cy + Math.sin(ang) * 150);
      g.strokeStyle = grd; g.lineWidth = 3; g.stroke();
      g.beginPath(); g.moveTo(cx, cy); g.arc(cx, cy, 150, ang - 0.5, ang); g.closePath();
      g.fillStyle = 'rgba(' + glowC + ',.06)'; g.fill();
    }
    // center hub
    g.beginPath(); g.arc(cx, cy, 52, 0, Math.PI * 2);
    g.fillStyle = 'rgba(' + inkC + ',.55)'; g.fill(); g.strokeStyle = th.glow; g.lineWidth = 2; g.stroke();
    const bpmEl = document.getElementById('se-bpm-val'); if (bpmEl) bpmEl.textContent = (document.getElementById('bpm') || {}).value || '90';
  };
  loop();
}
// ---- Flanking arced level meters ----
function seDrawArcs() {
  ['se-arc-l', 'se-arc-r'].forEach((id, side) => {
    const cv = document.getElementById(id); if (!cv) return;
    const dpr = 1; cv.width = 130; cv.height = Math.min(innerHeight * 0.6, 470);
    const g = cv.getContext('2d');
    let freq = (audioReady && analyser) ? new Uint8Array(analyser.frequencyBinCount) : null;
    const loop = () => {
      if (!seOn) return; requestAnimationFrame(loop);
      const W = cv.width, H = cv.height; g.clearRect(0, 0, W, H);
      let level = 0;
      if (freq) { analyser.getByteFrequencyData(freq); const half = side ? [freq.length / 2, freq.length] : [0, freq.length / 2]; for (let i = half[0]; i < half[1]; i++) level += freq[i]; level /= (freq.length / 2) * 255; }
      const cx = side ? -10 : W + 10, cy = H / 2, rad = H * 0.46;
      const a0 = side ? -Math.PI / 3 : Math.PI + Math.PI / 3, a1 = side ? Math.PI / 3 : Math.PI - Math.PI / 3;
      g.beginPath(); g.arc(cx, cy, rad, Math.min(a0, a1), Math.max(a0, a1)); g.strokeStyle = 'rgba(' + hexRGB(seLayout.theme.line) + ',.28)'; g.lineWidth = 8; g.stroke();
      g.beginPath(); g.arc(cx, cy, rad, Math.min(a0, a1), Math.min(a0, a1) + (Math.abs(a1 - a0)) * level); g.strokeStyle = 'rgba(' + hexRGB(seLayout.theme.glow) + ',.9)'; g.lineWidth = 8; g.stroke();
    };
    loop();
  });
}
// ---- Parallax: shift background layers with pointer / device tilt ----
let seParallaxBound = false;
function seParallax(e) {
  if (!seOn) return;
  const mx = (e.clientX / innerWidth - 0.5), my = (e.clientY / innerHeight - 0.5);
  document.querySelectorAll('#se-root [data-depth]').forEach(el => {
    const d = parseFloat(el.dataset.depth) || 0;
    el.style.transform = (el.classList.contains('se-motif') ? 'translateX(-50%) ' : '') + `translate(${-mx * d}px, ${-my * d}px)`;
  });
}

// ---- Animated particle field — a different look per theme ----
let seParticles = [];
function seInitParticles() {
  const cv = document.getElementById('se-particles'); if (!cv) return;
  cv.width = innerWidth; cv.height = innerHeight;
  const kind = seLayout.theme.particles, N = kind === 'stars' || kind === 'galaga' ? 140 : 70;
  seParticles = [];
  for (let i = 0; i < N; i++) seParticles.push({
    x: Math.random() * cv.width, y: Math.random() * cv.height,
    z: Math.random(), r: Math.random() * 2 + 0.5,
    vx: (Math.random() - 0.5) * 0.3, vy: Math.random() * 0.6 + 0.1,
    hue: Math.random() * 360, ph: Math.random() * Math.PI * 2
  });
}
function seParticleFrame() {
  if (!seOn) return;
  seParticleRAF = requestAnimationFrame(seParticleFrame);
  const cv = document.getElementById('se-particles'); if (!cv) return;
  const g = cv.getContext('2d'), W = cv.width, H = cv.height, th = seLayout.theme, kind = th.particles;
  g.clearRect(0, 0, W, H);
  const t = performance.now() / 1000;
  for (const p of seParticles) {
    if (kind === 'stars' || kind === 'galaga') {           // starfield drifting downward
      p.y += (kind === 'galaga' ? 1.6 : 0.4) * (0.3 + p.z);
      if (p.y > H) { p.y = 0; p.x = Math.random() * W; }
      const tw = 0.5 + 0.5 * Math.sin(t * 3 + p.ph);
      g.fillStyle = kind === 'galaga'
        ? ['#fff', '#ff2828', '#3ca0ff', '#ffe23c'][(p.ph * 4 | 0) % 4]
        : 'rgba(' + hexRGB(th.glow) + ',' + tw + ')';
      g.fillRect(p.x, p.y, p.r * (p.z + 0.5), p.r * (p.z + 0.5));
    } else if (kind === 'rain') {                          // cyberpunk code-rain streaks
      p.y += 3 + p.z * 4; if (p.y > H) { p.y = -20; p.x = Math.random() * W; }
      g.strokeStyle = 'rgba(' + hexRGB(p.z > 0.5 ? th.line : th.glow) + ',' + (0.15 + p.z * 0.5) + ')';
      g.lineWidth = 1; g.beginPath(); g.moveTo(p.x, p.y); g.lineTo(p.x, p.y + 14); g.stroke();
    } else if (kind === 'embers') {                        // warhammer rising embers
      p.y -= 0.4 + p.z; p.x += Math.sin(t + p.ph) * 0.3;
      if (p.y < 0) { p.y = H; p.x = Math.random() * W; }
      g.fillStyle = 'rgba(' + hexRGB(th.accent) + ',' + (0.2 + p.z * 0.5) + ')';
      g.beginPath(); g.arc(p.x, p.y, p.r, 0, Math.PI * 2); g.fill();
    } else if (kind === 'spores') {                        // mushroom RGB drifting spores
      p.x += p.vx; p.y += Math.sin(t + p.ph) * 0.4 - 0.2;
      if (p.y < 0) p.y = H; if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
      g.fillStyle = 'hsla(' + ((p.hue + t * 60) % 360) + ',90%,65%,0.7)';
      g.beginPath(); g.arc(p.x, p.y, p.r + 1, 0, Math.PI * 2); g.fill();
    } else {                                                // petals (samurai) drifting down
      p.y += 0.5 + p.z; p.x += Math.sin(t + p.ph) * 0.6;
      if (p.y > H) { p.y = -10; p.x = Math.random() * W; }
      g.fillStyle = 'rgba(' + hexRGB(th.accent) + ',' + (0.25 + p.z * 0.4) + ')';
      g.beginPath(); g.ellipse(p.x, p.y, p.r + 1.5, p.r * 0.6, p.ph + t, 0, Math.PI * 2); g.fill();
    }
  }
  // the New Year's dragon rides the samurai sky
  if (seThemeId === 'champloo') seDrawDragon(g, W, H);
  // mushroom theme: cycle the RGB accent lines live
  if (th.rgb) {
    const hue = (t * 60) % 360;
    const root = document.getElementById('se-root').style;
    root.setProperty('--se-line', 'hsl(' + hue + ',90%,62%)');
    root.setProperty('--se-glow', 'hsl(' + ((hue + 120) % 360) + ',90%,68%)');
    root.setProperty('--se-line-rgb', '255,90,180'); root.setProperty('--se-glow-rgb', '120,255,150');
  }
}

  document.getElementById('se-play').innerHTML = svgIcon(seqPlaying ? 'pause' : 'play');

function buildThemeBar() {
  const bar = document.getElementById('se-themebar'); if (!bar) return;
  bar.innerHTML = '';
  Object.entries(SE_THEMES).forEach(([id, th]) => {

function switchTheme(id) {
  if (!SE_THEMES[id]) return;
  seThemeId = id; seLayout = { theme: SE_THEMES[id], modules: SE_MODULES };
  seApplyTheme(seLayout.theme);
  document.querySelectorAll('#se-themebar .se-theme-btn').forEach(b => b.classList.toggle('on', b.textContent === SE_THEMES[id].name));
  // rebuild module titles/icons for the new theme, keep positions
  document.querySelectorAll('.se-mod').forEach(win => {
    const m = SE_MODULES.find(x => x.id === win.dataset.mid); if (!m) return;
    const title = seLayout.theme.titles[m.id] || m.id.toUpperCase();
    const mt = win.querySelector('.se-mod-head .mt'); if (mt) mt.innerHTML = svgIcon(m.icon) + title;
  });
  seInitParticles();
  const t = document.getElementById('se-title'); if (t) { const s = document.getElementById('se-subtitle'); }
  seToast(SE_THEMES[id].name + ' — theme engaged');
}
function enterSE(themeId) {
  if (!audioReady) initAudio();
  if (themeId) seThemeId = themeId;

  seWasStudio = document.body.classList.contains('studio');

  buildThemeBar();
  document.getElementById('se-dock').innerHTML = '';

  seDrawArcs();
  seInitParticles();
  seParticleFrame();
  if (!seParallaxBound) { window.addEventListener('pointermove', seParallax); seParallaxBound = true; }

function exitSE() {
  seOn = false; seRevolve = false;
  if (seHudRAF) cancelAnimationFrame(seHudRAF);
  if (seParticleRAF) cancelAnimationFrame(seParticleRAF);
  seRestoreModules();
  document.body.classList.remove('se-active');
  document.body.style.removeProperty('--wave-accent');
  applyLayout();
  toast('Back to classic studio');
}
function toggleSE() { if (seOn) exitSE(); else enterSE(); }
// wire entry + in-skin controls
document.getElementById('bnr-se').addEventListener('click', toggleSE);
document.getElementById('se-exit').addEventListener('click', exitSE);
document.getElementById('se-play').addEventListener('click', () => { seqPlayPause(); seRenderBarIcons(); });
document.getElementById('se-panic').addEventListener('click', () => panicStopAll());

// ---- REVOLVE MODE — the windows orbit the HUD; the scroll wheel spins them ----
let seRevolve = false, seOrbitAngle = 0;
function seLayoutGrid() {
  const { cw, ch, top } = seColsRows();
  document.querySelectorAll('.se-mod').forEach(win => {
    const m = SE_MODULES.find(x => x.id === win.dataset.mid); if (!m) return;
    const gp = m.grid_position;
    win.style.left = ((gp.x - 1) * cw) + 'px';
    win.style.top = (top + (gp.y - 1) * ch) + 'px';
    win.style.width = (gp.w * cw - 10) + 'px';
    win.style.height = (gp.h * ch - 10) + 'px';
    win.style.transform = ''; win.style.zIndex = '';
  });
}
function seLayoutRevolve() {
  const wins = [...document.querySelectorAll('.se-mod')];
  const N = wins.length || 1;
  const cx = innerWidth / 2, cy = innerHeight / 2 - 10;
  const rx = Math.min(innerWidth * 0.40, 600), ry = Math.min(innerHeight * 0.30, 260);
  const w = 380, h = 280;
  wins.forEach((win, i) => {
    const a = seOrbitAngle + i * Math.PI * 2 / N + Math.PI / 2; // front at bottom
    const x = cx + Math.cos(a) * rx, y = cy + Math.sin(a) * ry;
    const depth = (Math.sin(a) + 1) / 2; // 1 = closest (bottom of ellipse)
    const sc = 0.5 + depth * 0.55;
    win.style.width = w + 'px'; win.style.height = h + 'px';
    win.style.left = (x - w * sc / 2) + 'px';
    win.style.top = (y - h * sc / 2) + 'px';
    win.style.transform = 'scale(' + sc.toFixed(3) + ')';
    win.style.transformOrigin = 'top left';
    win.style.zIndex = 30 + Math.round(depth * 40);
  });
}
function setRevolve(on) {
  seRevolve = on;
  document.getElementById('se-revolve').classList.toggle('on', on);
  if (on) { seLayoutRevolve(); seToast('◉ REVOLVE — scroll to spin the console around the HUD'); }
  else seLayoutGrid();
}
document.getElementById('se-revolve').addEventListener('click', () => setRevolve(!seRevolve));

// scroll wheel: spins the carousel in revolve mode, cycles themes otherwise
document.getElementById('se-root').addEventListener('wheel', e => {
  if (!seOn) return;
  if (e.target.closest('.se-mod-body')) return; // let module content scroll normally
  e.preventDefault();
  if (seRevolve) {
    seOrbitAngle += (e.deltaY > 0 ? 1 : -1) * (Math.PI * 2 / (document.querySelectorAll('.se-mod').length || 7));
    seLayoutRevolve();
    return;
  }
  const ids = Object.keys(SE_THEMES); const i = ids.indexOf(seThemeId);
  switchTheme(ids[(i + (e.deltaY > 0 ? 1 : ids.length - 1)) % ids.length]);
}, { passive: false });

// ---- FLOATING BPM / VOLUME PILLS — drag anywhere, control the real transport ----
function sePillDrag(pill) {
  let drag = null;
  pill.addEventListener('pointerdown', e => {
    if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return;
    drag = { dx: e.clientX - pill.offsetLeft, dy: e.clientY - pill.offsetTop };
    try { pill.setPointerCapture(e.pointerId); } catch (err) {}
  });
  pill.addEventListener('pointermove', e => {
    if (!drag) return;
    pill.style.left = Math.max(0, e.clientX - drag.dx) + 'px';
    pill.style.top = Math.max(0, e.clientY - drag.dy) + 'px';
    pill.style.right = 'auto';
  });
  ['pointerup', 'pointercancel'].forEach(ev => pill.addEventListener(ev, () => drag = null));
}
sePillDrag(document.getElementById('se-bpm-pill'));
sePillDrag(document.getElementById('se-vol-pill'));
function seBpmNudge(d) {
  const el = document.getElementById('bpm');
  el.value = Math.max(40, Math.min(300, (parseInt(el.value) || 120) + d));
  document.getElementById('se-bpm-val').textContent = el.value;
}
document.getElementById('se-bpm-dn').addEventListener('click', () => seBpmNudge(-1));
document.getElementById('se-bpm-up').addEventListener('click', () => seBpmNudge(1));
document.getElementById('se-vol-range').addEventListener('input', e => {

  mv.value = e.target.value;
  mv.dispatchEvent(new Event('input'));
});

// ---- NEW YEAR'S DRAGON — serpentine gold/red flyby (samurai theme) ----
let seDragonT = 0;
function seDrawDragon(g, W, H) {
  seDragonT += 1 / 60;
  const cycle = 22, T = seDragonT % cycle;
  if (T > 11) return; // rests between flights
  const prog = T / 11;
  const hx = -160 + prog * (W + 320);
  const segs = 26;
  for (let s = segs - 1; s >= 0; s--) {
    const sx = hx - s * 22;
    if (sx < -40 || sx > W + 40) continue;
    const sy = H * 0.26 + Math.sin(seDragonT * 2.2 - s * 0.55) * 48;
    const r = Math.max(3, 14 - s * 0.38);
    g.fillStyle = s % 4 === 0 ? 'rgba(192,57,43,.85)' : 'rgba(217,164,65,.82)';
    g.beginPath(); g.arc(sx, sy, r, 0, Math.PI * 2); g.fill();
    if (s % 2 === 0 && s > 0) { // dorsal fins
      g.beginPath(); g.moveTo(sx - 4, sy - r); g.lineTo(sx, sy - r - 9); g.lineTo(sx + 4, sy - r); g.closePath();
      g.fillStyle = 'rgba(242,205,107,.9)'; g.fill();
    }
    if (s === 0) { // head: eye, horns, whiskers
      g.fillStyle = 'rgba(217,164,65,.95)';
      g.beginPath(); g.ellipse(sx + 10, sy, 17, 11, 0, 0, Math.PI * 2); g.fill();
      g.fillStyle = '#120404'; g.beginPath(); g.arc(sx + 16, sy - 3, 2.3, 0, Math.PI * 2); g.fill();
      g.strokeStyle = 'rgba(242,205,107,.95)'; g.lineWidth = 2;
      g.beginPath(); g.moveTo(sx + 4, sy - 10); g.lineTo(sx - 5, sy - 21); g.stroke();
      g.beginPath(); g.moveTo(sx + 11, sy - 10); g.lineTo(sx + 7, sy - 22); g.stroke();
      g.beginPath(); g.moveTo(sx + 25, sy + 1); g.quadraticCurveTo(sx + 42, sy + 5, sx + 48, sy - 3); g.stroke();
      g.beginPath(); g.moveTo(sx + 25, sy + 5); g.quadraticCurveTo(sx + 44, sy + 12, sx + 52, sy + 8); g.stroke();
    }
  }
}
window.addEventListener('resize', () => {
  if (!seOn) return;
  // reposition glass windows to the new viewport without re-parenting panels
  if (seRevolve) seLayoutRevolve(); else seLayoutGrid();
  seInitParticles();
});
