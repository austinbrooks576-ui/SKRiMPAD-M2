name: Build Android APK

on:
  workflow_dispatch: # Allows you to trigger the build manually with one click

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Java Environment
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      run: |
        npm install
        npm install @capacitor/core @capacitor/cli
        npx cap init Skrimpad com.skrimpad.specialedition --web-dir=.
        npx cap add android

    - name: Sync Capacitor Project
      run: npx cap sync android

    - name: Build APK with Gradle
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: skrimpad-3d-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
 
